<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }
        body {
            background: rgb(120, 96, 64);
            text-align: center;
        }
        #formContainer {
           border: solid 10px #0C2E7C;
           border-radius: 25px;
           width: 50vw;
           overflow: hidden;
           margin: auto; 
           margin-top: 20px;
        }
        #myForm {
            display: grid;
            grid-template-columns: 1fr 1fr;
            text-align: left;
            grid-gap: 15px;
            padding: 15px;
            background: white;
        }
        .buttonContainer {
            background-image: url("images/jesus_feeds_5000.jpeg");
            background-size: 50vw;
            height: 21vw;
            text-align: left;
        }
        button {
            margin: 10px;
        }
        h1 {
            margin-top: 5vw;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 1px black;
        }
        h2 {
            text-align: center;
            color: white;
            text-shadow: 1px 1px 1px black;
        }
        h3 {
            padding: 10px;
            background: white;
        }
        .newsletter {
            text-align: center;
            width: 100%;
            grid-column: 1/3;
            grid-row: 5/6; 
        }
        .conditions {
            text-align: center;
            width: 100%;
            grid-column: 1/3;
            grid-row: 6/7; 
        }
    
        .submit {
            text-align: center;
            width: 100%;
            grid-column: 1/3;
            grid-row: 7/8;
        }
        .books {
            display: grid;
            grid-template-columns: 10vw 10vw 10vw 10vw 10vw;
            grid-gap: 2px;
            background: white;
        }
        .books img {
            width: 100%;
        }
    </style>




</head>

<body>
    <div id="formContainer">
        <section class="buttonContainer">
            <button type="button" id="closeBtn">X</button>
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </section>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section class="newsletter">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section class="conditions">
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section class="submit">
                <button type="submit">Submit</button>
            </section>
        </form>
        <section class="books">
            <img src="images/old_testament.webp" alt="old testament book">
            <img src="images/new_testament.webp" alt="new testament book">
            <img src="images/book_of_mormon.webp" alt="book of mormon">
            <img src="images/doctrine_and_covenants.webp" alt="doctrine and covenants">
            <img src="images/pearl_of_great_price.webp" alt="pearl of great price">
        </section>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
