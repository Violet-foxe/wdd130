<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

* {
  box-sizing: border-box;
}

.bg-image {
  /* Full height */
  height: 900%;
  
  /* Center and scale the image nicely */
  /*background-position: center;*/
  background-repeat: no-repeat;
  background-size: cover;
}

.bg-image .img9{
    height: 50%;
    
  background-repeat: no-repeat;
  background-size: cover;
}

/* Images used */
.img1 { background-image: url("images/sky2.jpg"); }
.img2 { background-image: url("images/sky3.jpg"); }
.img3 { background-image: url("images/sky4.jpg"); }
.img4 { background-image: url("images/sky5.jpg"); }
.img5 { background-image: url("images/sky6.jpg"); }
.img6 { background-image: url("images/sky7.jpg"); }
.img7 { background-image: url("images/sky8.jpg"); }
.img8 { background-image: url("images/sky9.jpg"); }
/*.img9 { background-image: url("images/sky10.jpg"); }*/

/* Position text in the middle of the page/image */
.bg-text {
  background-color: rgb(0,0,0); /* Fallback color */
  background-color: rgba(0,0,0, 0.4); /* Black w/opacity/see-through */
  color: white;
  font-weight: bold;
  font-size: 40px;
  border: 10px solid #f1f1f1;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  width: 300px;
  padding: 20px;
  text-align: center;
}

.bottom-text{
    background-color: rgb(0,0,0); /* Fallback color */
  background-color: rgba(0,0,0, 0.4); /* Black w/opacity/see-through */
  color: white;
  font-weight: bold;
  font-size: 40px;
  border: 10px solid #f1f1f1;
  /*position: fixed;*/
  top: 50%;
  left: 50%;
  /*transform: translate(100%, 50%);*/
  z-index: 2;
  width: 300px;
  padding: 20px;
  text-align: center;
  justify-content: center;
}

</style>
</head>
<body>

<div class="bg-image img1"></div>
<div class="bg-image img2"></div>
<div class="bg-image img3"></div>
<div class="bg-image img4"></div>
<div class="bg-image img5"></div>
<div class="bg-image img6"></div>
<div class="bg-image img7"></div>
<div class="bg-image img8"></div>
<!--<div class="bg-image img9"></div>/!-->

<div class="bg-text">Do you love the color of the sky?</div>

<div class="bottom-text">Which one?</div>

</body>
</html>
