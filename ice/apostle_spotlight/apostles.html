<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        h1, h2 {
            font-family: Arial, Helvetica, sans-serif;
            justify-self: center;
            color: white;
            padding: 10px;
            font-weight: 100;
        }
        h1{font-size:36px}
        body {
            background-color: #e8eced;
        }
        #wrapper {
            margin: 20px auto; 
            background-image: url("images/christus.webp");
            background-position: -270px 0px;
            background-size: 200vh;
            border-radius: 25px;
            border: black solid 10px;
            width: 90vw;
            text-align: center;
        }
        img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 10px solid white;
            margin: 10px;
            margin-bottom: 15px;
            object-fit: cover;
            object-position: top;
        }
        .images {
            display: inline-block;
            justify-content: center;
        }
        .high{
            height: 135px;
            width: 135px;
        }
        .prophet{
            height: 160px;
            width:160px;
        }
        img:hover{
            border-color: black;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <h1>First Presidency</h1>
        <section class="images">
        <img src="images/eyring.webp" class="high"> <!--r1, c1-->
        <img src="images/oaks.webp" class="prophet"> <!--r2, c1-->
        <img src="images/christofferson.webp" class="high"> <!--r1, c3-->
        </section>

        <h2>Quorum of the Twelve Apostles</h2>
        <section class="images">
        <img src="images/holland.webp" class="apostles"> <!--r2, c1-->
        <img src="images/anderson.webp" class="apostles"> <!--r2, c1-->
        <img src="images/bednar.webp" class="apostles"> <!--r1, c3-->
        <img src="images/causse.webp" class="apostles"> <!--r3, c4-->
        <br>
        <img src="images/cook.webp" class="apostles"> <!--r2, c1-->
        <img src="images/gong.webp" class="apostles"> <!--r2, c1-->
        <img src="images/rasband.webp" class="apostles"> <!--r2, c1-->
        <img src="images/renlund.webp" class="apostles"> <!--r2, c1-->
        <br>
        <img src="images/soares.webp" class="apostles"> <!--r2, c1-->
        <img src="images/stevenson.webp" class="apostles"> <!--r2, c1-->
        <img src="images/uchtdorf.webp" class="apostles"> <!--r2, c1-->
        <img src="images/kearon.webp" class="apostles"> <!--r2, c1-->
        </section>
    </div>
</body>
</html>
